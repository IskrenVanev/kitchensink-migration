services:
  mongodb:
    image: mongo:8.2
    container_name: kitchensink-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitchensink-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      MONGO_URL: mongodb://mongodb:27017/kitchensink
    ports:
      - "8081:8080"

volumes:
  mongodb_data:
